<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Logo Brawl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== ГЛАВНОЕ МЕНЮ (HTML/CSS, поверх canvas) ===== -->
  <div id="menu">
    <div class="logo-wrap">
      <svg viewBox="0 0 200 190" class="hero-logo">
        <path d="M100,8
                 L108,72 L118,64 L112,90 L128,86
                 L100,120 L72,86 L88,90 L82,64 L92,72 Z
                 M100,120
                 L60,60 L10,100 L55,92 L35,108 L70,116
                 L100,120
                 L130,116 L165,108 L145,92 L190,100 L140,60 Z
                 M70,116 L60,150 L80,145 L85,165 L100,150
                 L115,165 L120,145 L140,150 L130,116 Z"
              fill="var(--gold)" />
      </svg>
      <h1>LOGO BRAWL</h1>
    </div>

    <div class="player-card">
      <div class="avatar-frame">
        <canvas id="avatarPreview" width="90" height="90"></canvas>
      </div>
      <div class="player-info">
        <div class="name-row">
          <div class="name" id="nameDisplay">Player_007</div>
          <button class="edit-nick" id="editNickBtn" title="Изменить ник">✎</button>
        </div>
        <div class="level-bar">
          <div class="level-fill" style="width:62%"></div>
          <span>LVL 14</span>
        </div>
        <div class="currency">🪙 1 250</div>
      </div>
    </div>

    <!-- выбор режима -->
    <div class="mode-select" id="modeSelect">
      <div class="mode-card selected" data-mode="zone">
        <span class="mode-icon">🚩</span>
        <h3>Захват зоны</h3>
        <p>Удерживай точку дольше ботов</p>
      </div>
      <div class="mode-card" data-mode="deathmatch">
        <span class="mode-icon">⚔️</span>
        <h3>Схватка</h3>
        <p>Побеждает последний живой</p>
      </div>
    </div>

    <div class="menu-buttons">
      <button class="btn btn-primary" id="playBtn">▶ ИГРАТЬ</button>
      <div class="btn-row">
        <button class="btn" id="shopBtn">🛒 Магазин</button>
        <button class="btn" id="friendsBtn">👥 Друзья</button>
        <button class="btn" id="roomBtn">🔑 Комната</button>
      </div>
    </div>

    <!-- окно магазина скинов -->
    <div id="shopPanel" class="panel hidden">
      <h2>Скины</h2>
      <div id="skinList" class="skin-grid"></div>
      <button class="btn small" id="closeShop">Закрыть</button>
    </div>

    <!-- окно комнаты -->
    <div id="roomPanel" class="panel hidden">
      <h2>Приватная комната</h2>
      <p>Твой код: <b id="roomCode">ROOM-000</b></p>
      <input id="joinCode" placeholder="Введите код друга (ROOM-123)">
      <button class="btn small" id="joinRoomBtn">Присоединиться</button>
      <button class="btn small" id="closeRoom">Закрыть</button>
    </div>
  </div>

  <!-- ===== ИГРОВОЕ ПОЛЕ ===== -->
  <div id="game-container"></div>

  <!-- ===== HUD ПОВЕРХ ИГРЫ ===== -->
  <div id="hud">
    <button id="exitBtn">✕</button>
    <div id="hudTop">
      <div id="timerBox">2:00</div>
      <div id="zoneBarWrap">
        <div id="zoneBarFill"></div>
        <div id="zoneBarLabel">Зона: 50%</div>
      </div>
      <div id="killCounter">💀 0</div>
    </div>

    <div id="joystickZone">
      <div class="joy-base" id="joyBase"></div>
      <div class="joy-nub" id="joyNub"></div>
    </div>

    <div id="actionButtons">
      <div class="action-btn" id="superBtn"><div id="superRing"></div>⚡</div>
      <div class="action-btn" id="attackBtn">👊</div>
    </div>
  </div>

  <!-- ===== ЭКРАН ИТОГОВ МАТЧА ===== -->
  <div id="resultOverlay">
    <div class="result-card">
      <div class="result-title" id="resultTitle">ПОБЕДА</div>
      <div class="result-sub" id="resultSub">Захват зоны</div>
      <table class="result-table">
        <thead>
          <tr><th>Игрок</th><th>Урон</th><th>Убийства</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
      <button class="btn btn-primary" id="backToMenuBtn">В МЕНЮ</button>
    </div>
  </div>

  <script src="skins.js"></script>
  <script src="controls.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>
</body>
</html>
